<!DOCTYPE html>
<html lang="en" data-theme="lofi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.3">

        <title>Surveyr Collect</title>
        <link href="/css/tailwind.css" id="tailwindCss" rel="stylesheet">
        <link href="/fonts/fontawesome/all.css" id="fontawesomeCss" rel="stylesheet">

        <link href="/js/libs/toast/toast.min.css" rel="stylesheet">
        <script src="/js/libs/toast/toast.min.js" id="toastJs"></script>

        <script src="/js/components.js"></script>
    </head>
    <body>
        <div class="content">
            <header class="py-4 px-3">
                <h3 class="text-base font-bold">Settings</h3>
                <div class="themeSwitch btn absolute end-3 top-3 btn-sm rounded" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </div>
            </header>
            
            <main class="py-6 px-3 overflow-y-auto relative">
                <div class="">
                    <!-- User Profile Section -->
                    <div class="flex items-center space-x-4 mb-6">
                        <div class="avatar">
                            <div class="w-16 rounded-full">
                                <img src="/img/flower.jpg" alt="User Avatar">
                            </div>
                        </div>
                        <div>
                            <h4 class="text-lg font-semibold" id="userName"></h4>
                            <p class="text-sm text-gray-500" id="userEmail"></p>
                        </div>
                    </div>

                    <hr>

                    <h1 class="text-sm font-semibold mt-6 mb-4 ms-4 text-gray-500">Resources</h1>
                    
                    <ul class="bg-base-100 w-full rounded-box mt-4 space-y-2">

                        <!-- Data Zones -->
                        <li class="border-b border-base-300 last:border-0">
                            <a href="/pages/zones/index.html" class="flex items-center py-4 px-4 hover:bg-base-200 transition-colors rounded-lg">
                                <i class="fa-regular fa-database mr-3"></i>
                                <span class="font-medium">Data Zones</span>
                                <i class="fa-solid fa-chevron-right ml-auto text-sm opacity-50"></i>
                            </a>
                        </li>

                        <!-- map -->
                        <li class="border-b border-base-300 last:border-0">
                            <a href="/pages/map/index.html" class="flex items-center py-4 px-4 hover:bg-base-200 transition-colors rounded-lg" onclick="underDevelopment(event)">
                                <i class="fa-regular fa-map mr-3"></i>
                                <span class="font-medium">Maps</span>
                                <i class="fa-solid fa-chevron-right ml-auto text-sm opacity-50"></i>
                            </a>
                        </li>

                        <!-- media -->
                        <li class="border-b border-base-300 last:border-0">
                            <a href="/pages/media/index.html" class="flex items-center py-4 px-4 hover:bg-base-200 transition-colors rounded-lg" onclick="underDevelopment(event)">
                                <i class="fa-regular fa-image mr-3"></i>
                                <span class="font-medium">Media</span>
                                <i class="fa-solid fa-chevron-right ml-auto text-sm opacity-50"></i>
                            </a>
                        </li>

                    </ul>
            
                    <!-- Notification Toggle ->
                    <div class="form-control w-full border-gray-200 dark:border-gray-700 pt-4">
                        <label class="label cursor-pointer">
                            <span class="label-text">Notification</span>
                            <input type="checkbox" class="toggle toggle-primary">
                        </label>
                    </div-->
            
                    <!-- Menu Items->
                    <ul class="menu bg-base-100 w-full rounded-box mt-4 space-y-2">
                        <li>
                            <a href="https://app.surveyr.co/docs" class="flex items-center" onclick="openInWebview(event)">
                                <i class="fa-duotone fa-solid fa-question-circle mr-2"></i>
                                <span>Help & Docs</span>
                            </a>
                        </li>
                        
                        <li>
                            <a class="flex items-center" onclick="underDevelopment(event)">
                                <i class="fa-duotone fa-solid fa-key mr-2"></i>
                                <span>Survey Mode Pin</span>
                            </a>
                        </li>
                    </ul -->
            
                    <!-- Logout Button -->
                    <div class="bottom-[1rem] left-0 absolute w-full px-3">
                        <button class="btn btn-danger bg-red-500 w-full mt-6 rounded-lg" onclick="logout()">
                            <span class="text-gray-100">Logout</span>
                        </button>
                    </div>
                </div>
            </main>            
            
            <footer class="py-4 px-3" id="navigationBar"></footer>
        </div>

        <script src="/js/app.js" id="appJs"></script>
        <script>
            function logout() {
                localStorage.clear();
                window.location.href = '/auth/login.html';
            }

            document.addEventListener('DOMContentLoaded', function() {
                try{
                    // get user details
                    var user = JSON.parse(localStorage.getItem('user'));
                    document.getElementById('userName').innerText = user.fullname;
                    document.getElementById('userEmail').innerText = user.email;
                }

                catch(e){
                    console.log(e);
                }
            });
        </script>
    </body>
</html>
